name: QatarSale Categories Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  detect_pages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect pages and build matrix
        id: build_matrix
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python << 'EOF'
          import json
          import os
          from scrapling import StealthyFetcher
          from detect_utils import get_last_page

          CATEGORIES = {
              "cars_for_rent":                 "https://qatarsale.com/ar/products/cars_for_rent?basic_search:StatusFilter=0",
              "special_numbers-plate_numbers": "https://qatarsale.com/ar/products/special_numbers-plate_numbers?basic_search:StatusFilter=0",
              "bikes":                         "https://qatarsale.com/ar/products/bikes?basic_search:StatusFilter=0",
              "caravan":                       "https://qatarsale.com/ar/products/caravan?basic_search:StatusFilter=0",
          }

          JOBS_PER_CATEGORY = {
              "cars_for_rent":                 5,
              "special_numbers-plate_numbers": 5,
              "bikes":                         2,
              "caravan":                       2,
          }

          matrix = {"include": []}

          for category, url in CATEGORIES.items():
              print(f"Detecting pages for {category}...")
              try:
                  last_page = get_last_page(url)
              except Exception as e:
                  print(f"Failed to detect pages for {category}: {e}")
                  last_page = 1

              print(f"  {category}: {last_page} pages")

              n_jobs = JOBS_PER_CATEGORY.get(category, 2)
              pages_per_job = max(1, last_page // n_jobs)

              for i in range(n_jobs):
                  start = i * pages_per_job + 1
                  end   = (i + 1) * pages_per_job if i < n_jobs - 1 else last_page
                  if start > last_page:
                      break
                  matrix["include"].append({
                      "category": category,
                      "start":    start,
                      "end":      end
                  })

          print(f"Matrix: {json.dumps(matrix, indent=2)}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          EOF

  detect_subcats:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect sub-categories and build matrix
        id: build_matrix
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python << 'EOF'
          import json
          import os
          import time
          from scrapling import StealthyFetcher
          from detect_utils import get_subcategories, analyze_category_with_products

          MULTI_CATEGORIES = {
              "car_spare_parts_accessories-automotive_exterior_accessories":
                  "https://qatarsale.com/ar/products/car_spare_parts_accessories-automotive_exterior_accessories?basic_search:StatusFilter=0",
              "heavy_equipments":
                  "https://qatarsale.com/ar/products/heavy_equipments?basic_search:StatusFilter=0",
              "car_spare_parts_accessories":
                  "https://qatarsale.com/ar/products/car_spare_parts_accessories?basic_search:StatusFilter=0",
              "jewellery":
                  "https://qatarsale.com/ar/products/jewellery?basic_search:StatusFilter=0",
              "property":
                  "https://qatarsale.com/ar/products/property?basic_search:StatusFilter=0"
          }

          PAGES_PER_JOB = {
              "car_spare_parts_accessories-automotive_exterior_accessories": 10,
              "heavy_equipments":            10,
              "car_spare_parts_accessories": 10,
              "jewellery":                   5,
              "property":                    15,
          }

          matrix = {"include": []}

          for category, base_url in MULTI_CATEGORIES.items():
              print(f"Detecting sub-categories for {category}...")
              try:
                  for attempt in range(3):
                      try:
                          subcats = get_subcategories(base_url)
                          if subcats:
                              break
                          print(f"  Attempt {attempt+1}: No sub-categories found, retrying...")
                          time.sleep(2)
                      except Exception as e:
                          print(f"  Attempt {attempt+1} failed: {e}")
                          time.sleep(2)
                  else:
                      print(f"  Failed to get subcats for {category} after 3 attempts")
                      continue
              except Exception as e:
                  print(f"Failed to get subcats for {category}: {e}")
                  continue

              print(f"  Found {len(subcats)} sub-categories")
              pages_per_job = PAGES_PER_JOB.get(category, 10)

              for subcat in subcats:
                  name = subcat["name"]
                  slug = subcat["slug"]
                  url  = subcat["url"] + "?basic_search:StatusFilter=0"

                  print(f"  Detecting pages for {name}...")
                  try:
                      last_page, has_products = analyze_category_with_products(url)
                  except Exception as e:
                      print(f"  Failed: {e}")
                      continue  

                  if not has_products:
                      print(f"    ⚠️ No products in {name}, skipping...")
                      continue

                  print(f"    {name}: {last_page} pages")

                  for i in range(0, last_page, pages_per_job):
                      start = i + 1
                      end   = min(i + pages_per_job, last_page)
                      matrix["include"].append({
                          "category":    category,
                          "subcat_name": name,
                          "subcat_slug": slug,
                          "subcat_url":  url,
                          "start":       start,
                          "end":         end,
                      })

          print(f"Total jobs: {len(matrix['include'])}")
          print(f"Matrix: {json.dumps(matrix, indent=2, ensure_ascii=False)}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
          EOF

  scrape:
    runs-on: ubuntu-latest
    needs: detect_pages
    strategy:
      matrix: ${{ fromJson(needs.detect_pages.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u main.py ${{ matrix.category }} ${{ matrix.start }} ${{ matrix.end }}

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: excel-${{ matrix.category }}-${{ matrix.start }}-${{ matrix.end }}
          path: |
            ${{ matrix.category }}_${{ matrix.start }}_${{ matrix.end }}.xlsx
            products_${{ matrix.category }}_${{ matrix.start }}_${{ matrix.end }}_failed.txt
          if-no-files-found: ignore

  scrape_subcats:
    runs-on: ubuntu-latest
    needs: detect_subcats
    strategy:
      matrix: ${{ fromJson(needs.detect_subcats.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper for sub-category pages
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u main.py \
            "${{ matrix.category }}" \
            "${{ matrix.subcat_slug }}" \
            ${{ matrix.start }} \
            ${{ matrix.end }} \
            "${{ matrix.subcat_url }}" \
            "${{ matrix.subcat_name }}"

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-excel-${{ matrix.category }}-${{ matrix.subcat_slug }}-${{ matrix.start }}-${{ matrix.end }}
          path: |
            ${{ matrix.category }}_${{ matrix.subcat_slug }}_${{ matrix.start }}_${{ matrix.end }}.xlsx
            products_${{ matrix.category }}_${{ matrix.subcat_slug }}_${{ matrix.start }}_${{ matrix.end }}_failed.txt
          
  merge:
    runs-on: ubuntu-latest
    needs: scrape
    permissions:
      contents: write

    strategy:
      matrix:
        category: [cars_for_rent, special_numbers-plate_numbers, bikes, caravan]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download artifacts for ${{ matrix.category }}
        uses: actions/download-artifact@v4
        with:
          pattern: excel-${{ matrix.category }}-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge and upload ${{ matrix.category }}
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, boto3, os
          from datetime import datetime

          category = "${{ matrix.category }}"
          files = glob.glob('excel_parts/*.xlsx')

          if not files:
              print(f"No Excel files found for {category}")
              exit(0)

          dfs = [pd.read_excel(f) for f in files]
          merged = pd.concat(dfs, ignore_index=True)
          merged = merged.drop_duplicates(subset=['product_url'], keep='first')

          output_file = f"{category}.xlsx"
          with pd.ExcelWriter(output_file, engine="openpyxl") as writer:
              merged.to_excel(writer, sheet_name=category[:31], index=False)

          total = len(merged)
          print(f"Category: {category} | Rows: {total} | Files merged: {len(files)}")

          summary_file = f"scrape_summary_{category}.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Date: {datetime.now().strftime('%Y-%m-%d')}\n")
              f.write(f"Total Rows: {total}\n")
              f.write(f"Files Merged: {len(files)}\n\n")
              for col in merged.columns:
                  missing = merged[col].isna().sum() + (merged[col] == '').sum()
                  pct = (missing / total) * 100 if total > 0 else 0
                  f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")

          client = boto3.client(
              's3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          dt = datetime.now()
          key = f"qatarsale/{dt.year}/{dt.strftime('%B').lower()}/{dt.day}/{output_file}"
          client.upload_file(
              output_file, bucket := os.environ['CF_R2_BUCKET_NAME'], key,
              ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}
          )
          print(f"Uploaded to R2: {key}")
          EOF

      - name: Collect failed URLs
        run: |
          python << 'EOF'
          import glob

          category = "${{ matrix.category }}"
          failed = []
          for f in glob.glob('excel_parts/*_failed.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          with open(f'failed_urls_{category}.txt', 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Total Failed URLs: {len(failed)}\n\n")
              for u in failed:
                  f.write(u + '\n')

          print(f"Failed URLs for {category}: {len(failed)}")
          EOF

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.category }}
          path: |
            scrape_summary_${{ matrix.category }}.txt
            failed_urls_${{ matrix.category }}.txt

  merge_subcats:
    runs-on: ubuntu-latest
    needs: scrape_subcats
    permissions:
      contents: write

    strategy:
      matrix:
        category:
          - car_spare_parts_accessories-automotive_exterior_accessories
          - heavy_equipments
          - car_spare_parts_accessories
          - jewellery
          - property

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download artifacts for ${{ matrix.category }}
        uses: actions/download-artifact@v4
        with:
          pattern: multi-excel-${{ matrix.category }}-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge sheets and upload
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, boto3, os
          from datetime import datetime

          category = "${{ matrix.category }}"
          files = glob.glob('excel_parts/*.xlsx')

          if not files:
              print(f"No Excel files found for {category}")
              exit(0)

          all_sheets = {}
          for f in files:
              xl = pd.ExcelFile(f)
              for sheet in xl.sheet_names:
                  df = xl.parse(sheet)
                  if sheet in all_sheets:
                      all_sheets[sheet] = pd.concat([all_sheets[sheet], df], ignore_index=True)
                  else:
                      all_sheets[sheet] = df

          for sheet in all_sheets:
              all_sheets[sheet] = all_sheets[sheet].drop_duplicates(subset=['product_url'], keep='first')

          output_file = f"{category}.xlsx"
          with pd.ExcelWriter(output_file, engine="openpyxl") as writer:
              for sheet_name, df in all_sheets.items():
                  safe = sheet_name[:31].replace("/","-").replace("\\","-").replace("*","").replace("?","").replace("[","").replace("]","")
                  df.to_excel(writer, sheet_name=safe, index=False)
                  print(f"  Sheet '{safe}': {len(df)} rows")

          print(f"Excel saved: {output_file}")

          summary_file = f"scrape_summary_{category}.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Date: {datetime.now().strftime('%Y-%m-%d')}\n")
              f.write(f"Total Sheets: {len(all_sheets)}\n\n")
              for sheet, df in all_sheets.items():
                  total = len(df)
                  f.write(f"--- {sheet} ---\n")
                  f.write(f"Rows: {total}\n")
                  for col in df.columns:
                      missing = df[col].isna().sum() + (df[col] == '').sum()
                      pct = (missing / total) * 100 if total > 0 else 0
                      f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")
                  f.write("\n")

          client = boto3.client(
              's3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          dt = datetime.now()
          key = f"qatarsale/{dt.year}/{dt.strftime('%B').lower()}/{dt.day}/{output_file}"
          client.upload_file(
              output_file, os.environ['CF_R2_BUCKET_NAME'], key,
              ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}
          )
          print(f"Uploaded to R2: {key}")
          EOF

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.category }}
          path: scrape_summary_${{ matrix.category }}.txt

  collect_summaries:
    runs-on: ubuntu-latest
    needs: [merge, merge_subcats]
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all summary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: summary-*
          merge-multiple: true
          path: all_summaries/

      - name: Merge summaries and failed URLs
        run: |
          python << 'EOF'
          import glob, os
          from datetime import datetime

          with open('scrape_summary.txt', 'w', encoding='utf-8') as out:
              out.write(f'Scrape Summary — {datetime.now().strftime("%Y-%m-%d")}\n')
              out.write('='*50 + '\n\n')
              for f in sorted(glob.glob('all_summaries/scrape_summary_*.txt')):
                  with open(f, 'r', encoding='utf-8') as file:
                      out.write(file.read() + '\n')

          with open('failed_urls.txt', 'w', encoding='utf-8') as out:
              for f in sorted(glob.glob('all_summaries/failed_urls_*.txt')):
                  with open(f, 'r', encoding='utf-8') as file:
                      out.write(file.read() + '\n')

          print("Done merging summaries")
          EOF

      - name: Commit summaries
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scrape_summary.txt failed_urls.txt
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add scrape_summary.txt failed_urls.txt
          git diff --staged --quiet || (
            git commit -m "scrape summary $(date +'%Y-%m-%d')" &&
            git push
          )