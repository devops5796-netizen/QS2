name: QatarSale Sub Categories Scraper

on:
  repository_dispatch:
    types: [users-done]
  workflow_dispatch:

jobs:
  detect_subcats:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect sub-categories and build matrix
        id: build_matrix
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python << 'EOF'
          import json
          import os
          import time
          from scrapling import StealthyFetcher
          from detect_utils import get_subcategories_sub, analyze_category_with_products

          MULTI_CATEGORIES = {
              "car_spare_parts_accessories-automotive_exterior_accessories":
                  "https://qatarsale.com/ar/products/car_spare_parts_accessories-automotive_exterior_accessories?basic_search:StatusFilter=0",
              "heavy_equipments":
                  "https://qatarsale.com/ar/products/heavy_equipments?basic_search:StatusFilter=0",
              "car_spare_parts_accessories":
                  "https://qatarsale.com/ar/products/car_spare_parts_accessories?basic_search:StatusFilter=0",
              "jewellery":
                  "https://qatarsale.com/ar/products/jewellery?basic_search:StatusFilter=0",
              "property":
                  "https://qatarsale.com/ar/products/property?basic_search:StatusFilter=0",
              "watercrafts":
                  "https://qatarsale.com/ar/products/watercrafts?basic_search:StatusFilter=0",
              "computers_and_parts":    
                  "https://qatarsale.com/ar/products/computers_and_parts?basic_search:StatusFilter=0",
              "video_games":
                  "https://qatarsale.com/ar/products/video_games?basic_search:StatusFilter=0",
              "wrist_watches":
                  "https://qatarsale.com/ar/products/wrist_watches?basic_search:StatusFilter=0",
              "home_security_surveillance_systems":
                  "https://qatarsale.com/ar/products/home_security_surveillance_systems?basic_search:StatusFilter=0",
              "health_beauty":
                  "https://qatarsale.com/ar/products/health_beauty?basic_search:StatusFilter=0",
              "toys_games":
                  "https://qatarsale.com/ar/products/toys_games?basic_search:StatusFilter=0",
              "kids":
                  "https://qatarsale.com/ar/products/kids?basic_search:StatusFilter=0",
              "shoes_bags":
                  "https://qatarsale.com/ar/products/shoes_bags?basic_search:StatusFilter=0",
              "arts_crafts_sewing":
                  "https://qatarsale.com/ar/products/arts_crafts_sewing?basic_search:StatusFilter=0",
              "kitchen_dining_room":
                  "https://qatarsale.com/ar/products/kitchen_dining_room?basic_search:StatusFilter=0",
              "education":
                  "https://qatarsale.com/ar/products/education?basic_search:StatusFilter=0",
              "bikes_accessories":
                  "https://qatarsale.com/ar/products/bikes_accessories?basic_search:StatusFilter=0",
              "clothes": 
                  "https://qatarsale.com/ar/products/clothes?basic_search:StatusFilter=0",
              "camping":
                  "https://qatarsale.com/ar/products/camping?basic_search:StatusFilter=0",
              "tools_home_improvement":
                  "https://qatarsale.com/ar/products/tools_home_improvement?basic_search:StatusFilter=0",
              "men_accessories":
                  "https://qatarsale.com/ar/products/men_accessories?basic_search:StatusFilter=0",
              "musical_instruments":
                  "https://qatarsale.com/ar/products/musical_instruments?basic_search:StatusFilter=0"
          }

          PAGES_PER_JOB = {
              "car_spare_parts_accessories-automotive_exterior_accessories": 20,
              "heavy_equipments":                                      20,
              "car_spare_parts_accessories":                           20,
              "jewellery":                                             20,
              "property":                                              20,
              "watercrafts":                                           20,
              "computers_and_parts":                                   20,
              "video_games":                                           20,
              "wrist_watches":                                         20,
              "home_security_surveillance_systems":                    20,
              "health_beauty":                                         20,
              "toys_games":                                            20,
              "kids":                                                  20,
              "shoes_bags":                                            20,
              "arts_crafts_sewing":                                    20,
              "kitchen_dining_room":                                   20,
              "education":                                             20,
              "bikes_accessories":                                     20,
              "clothes":                                               20,
              "camping":                                               20,
              "tools_home_improvement":                                20,
              "men_accessories":                                       20,
              "musical_instruments":                                   20
          }

          matrix = {"include": []}

          for category, base_url in MULTI_CATEGORIES.items():
              print(f"Detecting sub-categories for {category}...")
              try:
                  for attempt in range(3):
                      try:
                          subcats = get_subcategories_sub(base_url)
                          if subcats:
                              break
                          print(f"  Attempt {attempt+1}: No sub-categories found, retrying...")
                          time.sleep(2)
                      except Exception as e:
                          print(f"  Attempt {attempt+1} failed: {e}")
                          time.sleep(2)
                  else:
                      print(f"  Failed to get subcats for {category} after 3 attempts")
                      continue
              except Exception as e:
                  print(f"Failed to get subcats for {category}: {e}")
                  continue

              print(f"  Found {len(subcats)} sub-categories")
              pages_per_job = PAGES_PER_JOB.get(category, 10)

              for subcat in subcats:
                  name = subcat["name"]
                  slug = subcat["slug"]
                  url  = subcat["url"] + "?basic_search:StatusFilter=0"

                  print(f"  Detecting pages for {name}...")
                  try:
                      last_page, has_products = analyze_category_with_products(url)
                  except Exception as e:
                      print(f"  Failed: {e}")
                      continue  

                  if not has_products:
                      print(f"    ⚠️ No products in {name}, skipping...")
                      continue

                  print(f"    {name}: {last_page} pages")

                  for i in range(0, last_page, pages_per_job):
                      start = i + 1
                      end   = min(i + pages_per_job, last_page)
                      matrix["include"].append({
                          "category":    category,
                          "subcat_name": name,
                          "subcat_slug": slug,
                          "subcat_url":  url,
                          "start":       start,
                          "end":         end,
                      })

          print(f"Total jobs: {len(matrix['include'])}")
          print(f"Matrix: {json.dumps(matrix, indent=2, ensure_ascii=False)}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
          EOF

  scrape_subcats:
    runs-on: ubuntu-latest
    needs: detect_subcats
    strategy:
      matrix: ${{ fromJson(needs.detect_subcats.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper for sub-category pages
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u main_sub.py \
            "${{ matrix.category }}" \
            "${{ matrix.subcat_slug }}" \
            ${{ matrix.start }} \
            ${{ matrix.end }} \
            "${{ matrix.subcat_url }}" \
            "${{ matrix.subcat_name }}"

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-excel-${{ matrix.category }}-${{ matrix.subcat_slug }}-${{ matrix.start }}-${{ matrix.end }}
          path: |
            ${{ matrix.category }}_${{ matrix.subcat_slug }}_${{ matrix.start }}_${{ matrix.end }}.xlsx
            products_${{ matrix.category }}_${{ matrix.subcat_slug }}_${{ matrix.start }}_${{ matrix.end }}_failed.txt
          
  merge_subcats:
    runs-on: ubuntu-latest
    needs: scrape_subcats

    strategy:
      matrix:
        category:
          - car_spare_parts_accessories-automotive_exterior_accessories
          - heavy_equipments
          - car_spare_parts_accessories
          - jewellery
          - property
          - watercrafts
          - computers_and_parts
          - video_games
          - wrist_watches
          - home_security_surveillance_systems
          - health_beauty
          - toys_games
          - kids
          - shoes_bags
          - arts_crafts_sewing
          - kitchen_dining_room
          - education
          - bikes_accessories
          - clothes
          - camping
          - tools_home_improvement
          - men_accessories
          - musical_instruments


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3 python-dotenv

      - name: Download artifacts for ${{ matrix.category }}
        uses: actions/download-artifact@v4
        with:
          pattern: multi-excel-${{ matrix.category }}-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge sheets and upload
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime
          from r2_uploader import upload_final_batch_assets

          category = "${{ matrix.category }}"
          files = glob.glob('excel_parts/*.xlsx')

          if not files:
              print(f"No Excel files found for {category}")
              dt = datetime.now()
              
              # Empty Excel
              output_file = f"{category}.xlsx"
              pd.DataFrame().to_excel(output_file, index=False)

              # Summary with NO DATA
              summary_file = f"scrape_summary_{category}.txt"
              with open(summary_file, 'w', encoding='utf-8') as f:
                  f.write(f"=== {category} ===\n")
                  f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
                  f.write(f"Status: NO DATA\n")
                  f.write(f"Total Sheets: 0\n")
                  f.write(f"Total Rows: 0\n")

              # Upload both to R2
              client = boto3.client('s3',
                  endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
                  aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
                  aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
                  region_name='auto'
              )
              bucket = os.environ['CF_R2_BUCKET_NAME']

              client.upload_file(output_file, bucket,
                  f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/{category}/excel/{category}.xlsx",
                  ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})

              client.upload_file(summary_file, bucket,
                  f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/{category}/summary/scrape_summary.txt",
                  ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})

              print(f"Uploaded empty placeholder files for {category}")
              exit(0)
          
          all_sheets = {}
          for f in files:
              xl = pd.ExcelFile(f)
              for sheet in xl.sheet_names:
                  df = xl.parse(sheet)
                  if sheet in all_sheets:
                      all_sheets[sheet] = pd.concat([all_sheets[sheet], df], ignore_index=True)
                  else:
                      all_sheets[sheet] = df

          for sheet in all_sheets:
              all_sheets[sheet] = all_sheets[sheet].drop_duplicates(subset=['product_url'], keep='first')

          output_file = f"{category}.xlsx"
          with pd.ExcelWriter(output_file, engine="openpyxl") as writer:
              for sheet_name, df in all_sheets.items():
                  safe = sheet_name[:31].replace("/","-").replace("\\","-").replace("*","").replace("?","").replace("[","").replace("]","")
                  df.to_excel(writer, sheet_name=safe, index=False)
                  print(f"  Sheet '{safe}': {len(df)} rows")

          print(f"Excel saved: {output_file}")

          # Upload Excel
          result = upload_final_batch_assets(
              images_folder="",
              final_excel=output_file,
              folder_name="qatarsale",
              category=category
          )
          print(f"Upload result: {result}")

          # Generate + upload summary directly to R2
          dt = datetime.now()
          summary_file = f"scrape_summary_{category}.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
              f.write(f"Status: DONE\n")
              f.write(f"Total Sheets: {len(all_sheets)}\n\n")
              for sheet, df in all_sheets.items():
                  total = len(df)
                  f.write(f"--- {sheet} ---\n")
                  f.write(f"Rows: {total}\n")
                  for col in df.columns:
                      missing = df[col].isna().sum() + (df[col] == '').sum()
                      pct = (missing / total) * 100 if total > 0 else 0
                      f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")
                  f.write("\n")

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          bucket = os.environ['CF_R2_BUCKET_NAME']
          key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/{category}/summary/scrape_summary.txt"
          client.upload_file(summary_file, bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Summary uploaded: {key}")

          failed = []
          for f in glob.glob('excel_parts/*_failed.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          successful = sum(len(df) for df in all_sheets.values())

          total_scraped = successful + len(failed)

          failed_percentage = (
              (len(failed) / total_scraped) * 100
              if total_scraped > 0 else 0
          )

          failed_file = f"failed_urls_{category}.txt"
          with open(failed_file, 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Total Failed URLs: {len(failed)}\n\n")
              f.write(f"Failed URL Percentage: {failed_percentage:.2f}%\n")              
              for u in failed:
                  f.write(u + '\n')

          failed_key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/{category}/summary/failed_urls.txt"
          client.upload_file(failed_file, bucket, failed_key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Failed URLs uploaded: {failed_key}")
          EOF

      - name: Monitor - Compare with yesterday
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3, os, json, glob
          import pandas as pd
          from io import BytesIO
          from datetime import datetime, timezone, timedelta

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          bucket   = os.environ['CF_R2_BUCKET_NAME']
          category = "${{ matrix.category }}"
          dt       = datetime.now(timezone.utc)
          yesterday = (dt.date() - timedelta(days=1))

          # ── Read current data ──
          files = glob.glob('excel_parts/*.xlsx')
          if not files:
              print("No Excel files found, skipping monitor.")
              exit(0)

          dfs = []
          for f in files:
              xl = pd.ExcelFile(f)
              for sheet in xl.sheet_names:
                  dfs.append(xl.parse(sheet))

          current_df = pd.concat(dfs, ignore_index=True)
          current_df = current_df.drop_duplicates(subset=['id'], keep='first')
          print(f"Current (today):   {len(current_df)} products")

          # ── Read previous data (yesterday's Excel from R2) ──
          file_key = (
              f"qatarsale/year={yesterday.year}/month={yesterday.strftime('%m')}/"
              f"day={yesterday.strftime('%d')}/{category}/excel/{category}.xlsx"
          )
          try:
              obj        = client.get_object(Bucket=bucket, Key=file_key)
              excel_file = BytesIO(obj["Body"].read())
              sheets     = pd.read_excel(excel_file, sheet_name=None)
              previous_df = pd.concat(sheets.values(), ignore_index=True)
              print(f"Previous (yesterday): {len(previous_df)} products")
          except Exception as e:
              print(f"Could not load yesterday's data: {e}")
              exit(0)

          # ── Compare ──
          current_df["id"]  = current_df["id"].astype(str)
          previous_df["id"] = previous_df["id"].astype(str)

          current_ids  = set(current_df["id"].dropna())
          previous_ids = set(previous_df["id"].dropna())

          removed_ids   = previous_ids - current_ids
          remaining_ids = previous_ids & current_ids

          current_indexed  = current_df.set_index("id")
          previous_indexed = previous_df.set_index("id")

          rows = []

          # Remaining - check changes
          for id_ in remaining_ids:
              if id_ not in current_indexed.index or id_ not in previous_indexed.index:
                  continue
              curr = current_indexed.loc[id_]
              prev = previous_indexed.loc[id_]

              if curr.get("isSold") and not prev.get("isSold"):
                if curr.get('advertisedFor') == 0:
                  status = "sold"
                if curr.get('advertisedFor') == 1:
                  status = "rent"
              elif curr.get("isExpired") and not prev.get("isExpired"):
                  status = "expired"
              else:
                  status = "no_change"

              rows.append({
                  "id":            id_,
                  "product_url":   curr.get("product_url", ""),
                  "isSold":        curr.get("isSold", ""),
                  "isExpired":     curr.get("isExpired", ""),
                  "status_change": status
              })

          monitor_df = pd.DataFrame(rows)

          # ── Save locally ──
          os.makedirs(category, exist_ok=True)
          excel_path = f"{category}/monitor_{category}.xlsx"
          monitor_df.to_excel(excel_path, index=False)
          print(f"Saved Excel: {excel_path} ({len(monitor_df)} rows)")

          summary = {
              "date":      dt.strftime("%Y-%m-%d"),
              "category":  category,
              "sold":      int((monitor_df["status_change"] == "sold").sum()),
              "rent":       int((monitor_df["status_change"] == "rent").sum()),
              "expired":   int((monitor_df["status_change"] == "expired").sum()),
              "no_change": int((monitor_df["status_change"] == "no_change").sum()),
          }
          json_path = f"{category}/monitor_{category}.json"
          with open(json_path, "w", encoding="utf-8") as f:
              json.dump(summary, f, ensure_ascii=False, indent=2)

          print(f"  Sold:      {summary['sold']}")
          print(f"  Rent:      {summary['rent']}")
          print(f"  Expired:   {summary['expired']}")
          print(f"  No change: {summary['no_change']}")

          # ── Upload both to R2 ──
          for local_path, content_type, r2_suffix in [
              (excel_path, "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", f"excel/monitor_{category}.xlsx"),
              (json_path,  "application/json; charset=utf-8", f"json/monitor_{category}.json"),
          ]:
              r2_key = (
                  f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/"
                  f"day={dt.strftime('%d')}/{category}/{r2_suffix}"
              )
              client.upload_file(local_path, bucket, r2_key, ExtraArgs={"ContentType": content_type})
              print(f"Uploaded: {r2_key}")
          EOF


  